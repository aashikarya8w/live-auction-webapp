version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bidnexus_db
    environment:
      POSTGRES_DB: clothes_auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aashik123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: bidnexus_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/clothes_auction
      DB_USERNAME: postgres
      DB_PASSWORD: aashik123
      JWT_SECRET: mysupersecretkeymysupersecretkeymysupersecretkey123
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: bidnexus_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
